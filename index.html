
<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>लेन पकड आणि Race Finish कर</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@900&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background-image: url('phoolpada_swimming_pool.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 30, 60, 0.55);
    }

    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 3rem;
      border-radius: 12px;
    }

    h1 {
      font-family: 'Noto Sans Devanagari', 'Segoe UI', Arial, sans-serif;
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 900;
      color: #ffffff;
      text-shadow:
        0 2px 8px rgba(0, 0, 0, 0.7),
        0 0 40px rgba(0, 180, 255, 0.6);
      letter-spacing: 0.02em;
      line-height: 1.3;
    }


    h3 {
      font-family: 'Noto Sans Devanagari', 'Segoe UI', Arial, sans-serif;
      color: #ffffff;
      letter-spacing: 0.02em;
	  
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="hero">
    <h1>लेन पकड आणि Race Finish कर</h1>
	<h3>Virar Swimming</h3>
  </div>
</body>
</html>
